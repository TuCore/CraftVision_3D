name: Frontend CI (Next.js)

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'frontend/**'

jobs:
  build-and-lint:
    name: Build & Lint Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Tải mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Sử dụng phiên bản Node LTS
        # Tạm thời tắt cache vì chưa có package-lock.json
        # cache: 'npm'
        # cache-dependency-path: './frontend/package-lock.json'

    # Nếu có file package.json thì mới chạy cài đặt thư viện
    - name: Kiểm tra và cài đặt thư viện
      run: |
        if [ -f "package.json" ]; then
          npm install
        else
          echo "Bỏ qua npm install vì chưa khởi tạo Next.js"
        fi

    - name: Kiểm tra Code (Lint)
      run: |
        if [ -f "package.json" ]; then
          npm run lint --if-present
        else
          echo "Bỏ qua npm run lint"
        fi

    - name: Build Next.js App
      run: |
        if [ -f "package.json" ]; then
          npm run build
        else
          echo "Bỏ qua npm run build"
        fi
