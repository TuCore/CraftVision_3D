version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: craftvision_db
    environment:
      POSTGRES_USER: craftvision_user
      POSTGRES_PASSWORD: craftvision_password
      POSTGRES_DB: craftvision_db
    ports:
      - "5434:5432"
    volumes:
      - ./databases:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: craftvision_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:

