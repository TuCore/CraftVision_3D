server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # API → Backend (.NET đang chạy trên máy ở cổng 5192)
    location /api/ {
        proxy_pass http://host.docker.internal:5192;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR / WebSocket (Nếu backend dùng cho chat realtime sau này)
    location /chatHub {
        proxy_pass http://host.docker.internal:5192;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend (Next.js đang chạy npm run dev ở cổng 3000)
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Bắt buộc phải có để Next.js Hot Reload (HMR) qua WebSocket hoạt động
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
